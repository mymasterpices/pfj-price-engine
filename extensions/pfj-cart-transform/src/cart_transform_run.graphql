# extensions/pfj-cart-transform/src/cart_transform_run.graphql
#
# File name must match the JS file: cart_transform_run.graphql
#
# cost.amountPerQuantity is the correct field for price + currencyCode
# in the Cart Transform Functions schema.
# merchandise.price does NOT exist in Functions schema (Admin API only).

query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      attribute(key: "_surcharge") {
        key
        value
      }
      merchandise {
        ... on ProductVariant {
          id
          title
        }
      }
    }
  }
}
